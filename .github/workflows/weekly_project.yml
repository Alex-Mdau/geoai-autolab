name: 🚀 Weekly GeoAI Project Generator

on:
  schedule:
    - cron: '0 9 * * 1'   # Every Monday at 9:00 AM UTC
  workflow_dispatch:        # Also triggerable manually from GitHub UI

jobs:
  generate-project:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install core dependencies
        run: |
          pip install --upgrade pip
          pip install \
            geopandas \
            folium \
            pandas \
            numpy \
            scikit-learn \
            scipy \
            matplotlib \
            requests \
            shapely \
            rasterio \
            networkx \
            plotly \
            fastapi \
            uvicorn \
            pydantic \
            pytest \
            python-dotenv

      - name: Generate this week's project
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: |
          cd orchestrator
          python orchestrator.py --mode=weekly

      - name: Configure git
        run: |
          git config --global user.name "GeoAI AutoLab Bot"
          git config --global user.email "autolab-bot@geoai.dev"

      - name: Commit and push
        run: |
          git add -A
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            WEEK=$(python -c "import json; s=json.load(open('state.json')); print(s.get('week',1))")
            PROJECT=$(python -c "import json; s=json.load(open('state.json')); print(s.get('current_project','New Project'))")
            git commit -m "🤖 AutoLab Week ${WEEK}: ${PROJECT}"
            git push
            echo "✅ Committed: Week ${WEEK} — ${PROJECT}"
          fi
